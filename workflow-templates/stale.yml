name: Stale issues and PRs

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,in-progress"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            had no activity for 60 days. It will be closed in 14 days if no
            further activity occurs. Add a comment to keep it open.
          close-issue-message: >
            Closing this issue as stale. Feel free to reopen if it's still
            relevant.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for 30 days. It will be closed in 14 days if no
            further activity occurs.
          close-pr-message: >
            Closing this PR as stale. Feel free to reopen when you're ready to
            continue.
