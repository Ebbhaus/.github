name: RFC / design proposal
description: Propose a non-trivial technical change or architectural decision
labels: ["rfc"]
title: "[RFC] "
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are we trying to do, and why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: The actual design. Be specific.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you look at, and why is this better?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and unknowns
    validations:
      required: false
  - type: textarea
    id: rollout
    attributes:
      label: Rollout plan
      description: How do we ship this safely? Migration, feature flag, backfill, etc.
    validations:
      required: false
  - type: input
    id: reviewers
    attributes:
      label: Reviewers
      description: Who needs to weigh in before this is accepted?
    validations:
      required: true
