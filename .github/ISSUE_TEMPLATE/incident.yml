name: Incident
description: Track an ongoing or recent incident
labels: ["incident"]
title: "[INCIDENT] "
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - SEV-1
        - SEV-2
        - SEV-3
    validations:
      required: true
  - type: input
    id: started
    attributes:
      label: Detected at (UTC)
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What's happening?
      description: Short summary of customer impact and affected systems.
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      description: Append events as they happen (detection, mitigation, comms, resolution).
      placeholder: |
        HH:MM UTC — detected via <alert>
        HH:MM UTC — paged <oncall>
        HH:MM UTC — mitigation deployed
    validations:
      required: true
  - type: input
    id: commander
    attributes:
      label: Incident commander
    validations:
      required: true
  - type: textarea
    id: followups
    attributes:
      label: Follow-ups
      description: Action items, postmortem link, root cause notes.
    validations:
      required: false
