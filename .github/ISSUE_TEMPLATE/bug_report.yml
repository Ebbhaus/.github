name: Bug
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences on what's broken.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: prod / staging / local, commit SHA, user or tenant affected, etc.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs, traces, screenshots
      description: Link to Datadog, Sentry, or paste relevant snippets.
      render: shell
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - SEV-1 (customer-impacting, page on-call)
        - SEV-2 (degraded, fix this week)
        - SEV-3 (annoying, fix when we can)
    validations:
      required: true
