name: Feature / work item
description: New functionality, improvement, or scoped work
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or business problem does this solve? Link to the Linear / product doc if there is one.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What does "done" look like? Bullet list.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Open questions / notes
    validations:
      required: false
