name: Tech debt / cleanup
description: Refactor, migration, or debt repayment
labels: ["tech-debt"]
body:
  - type: textarea
    id: what
    attributes:
      label: What's the debt?
      description: Describe the smell, the hack, or the outdated pattern.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does it matter?
      description: Cost of leaving it — slowness, bug risk, onboarding pain, blocked work.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed fix
    validations:
      required: false
  - type: dropdown
    id: size
    attributes:
      label: Rough size
      options:
        - XS (<1 day)
        - S (1-3 days)
        - M (1 week)
        - L (multiple weeks)
    validations:
      required: true
