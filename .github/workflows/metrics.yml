name: Metrics

on:
  # Regenerate every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Let anyone trigger manually
  workflow_dispatch:
  # Rebuild when the workflow itself changes
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write
  pull-requests: write

env:
  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

jobs:
  github-metrics:
    name: Generate org metrics
    runs-on: ubuntu-latest
    steps:
      - uses: 1password/install-cli-action@v3
      - name: Get GitHub App credentials
        id: app-creds
        run: |
          echo "app-id=$(op read 'op://Ebbhaus/GitHub App/app id')" >> "$GITHUB_OUTPUT"
          echo "private-key<<GHEOF" >> "$GITHUB_OUTPUT"
          op read 'op://Ebbhaus/GitHub App/private key' >> "$GITHUB_OUTPUT"
          echo "GHEOF" >> "$GITHUB_OUTPUT"
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ steps.app-creds.outputs.app-id }}
          private-key: ${{ steps.app-creds.outputs.private-key }}
          owner: Ebbhaus

      # Ensure the metrics-renders branch exists and matches main so the
      # lowlighter/metrics action has something to commit to. The branch is
      # squash-merged and deleted at the end of each run, so we recreate it
      # (or force-reset it if a previous run left it behind) every time.
      - name: Prepare metrics-renders branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          MAIN_SHA=$(gh api repos/Ebbhaus/.github/git/ref/heads/main --jq .object.sha)
          if gh api repos/Ebbhaus/.github/git/ref/heads/metrics-renders >/dev/null 2>&1; then
            gh api repos/Ebbhaus/.github/git/refs/heads/metrics-renders \
              -X PATCH -f sha="$MAIN_SHA" -F force=true
          else
            gh api repos/Ebbhaus/.github/git/refs \
              -X POST -f ref=refs/heads/metrics-renders -f sha="$MAIN_SHA"
          fi

      # Combined overview: activity, community, repositories, plus topics and followup.
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.svg
          token: ${{ steps.app-token.outputs.token }}
          user: Ebbhaus
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          plugin_topics: yes
          plugin_topics_mode: icons
          output_action: commit
          committer_branch: metrics-renders

      # Language breakdown across the org (public repos only).
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.plugin.languages.svg
          token: ${{ steps.app-token.outputs.token }}
          user: Ebbhaus
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          plugin_languages: yes
          plugin_languages_ignored: html, css, shell, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          output_action: commit
          committer_branch: metrics-renders

      # Recent activity feed.
      - name: Activity
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.plugin.activity.svg
          token: ${{ steps.app-token.outputs.token }}
          user: Ebbhaus
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, push, review, ref/create
          output_action: pull-request-squash
          committer_branch: metrics-renders
